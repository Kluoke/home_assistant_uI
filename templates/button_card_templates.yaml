apple_base:
    styles:
      card:
        - border-radius: 24px
        - overflow: hidden
        - background: rgba(255,255,255,.22)
        - backdrop-filter: blur(30px)
        - '-webkit-backdrop-filter': blur(30px)
        - border: 1px solid rgba(255,255,255,.35)
        - box-shadow: |
            inset 0 1px 0 rgba(255,255,255,.65),
            inset 0 -1px 0 rgba(255,255,255,.10),
            0 10px 30px rgba(0,0,0,.08)
        - transition: all .25s ease

  apple_home:
    template:
      - apple_base
    tap_action:
      action: toggle
    hold_action:
      action: more-info
    state:
      - value: 'on'
        styles:
          card:
            - background: |
                linear-gradient(
                  135deg,
                  rgba(255,214,10,.92),
                  rgba(255,194,20,.82),
                  rgba(255,170,20,.72)
                )
            - border: 1px solid rgba(255,255,255,.45)
            - box-shadow: |
                0 0 35px rgba(255,190,20,.30),
                0 12px 28px rgba(0,0,0,.12)
          icon:
            - color: white
            - width: 38px
          name:
            - color: white
      - value: 'off'
        styles:
          card:
            - background: rgba(255,255,255,.18)
          icon:
            - color: '#606060'
          name:
            - color: '#303030'

  apple_contact:
    tap_action:
      action: more-info
    hold_action:
      action: more-info
    template:
      - apple_base
    icon: |
      [[[
        if (entity.state === 'on')
          return 'mdi:door-open';
        return 'mdi:door-closed';
      ]]]
    state:
      - value: 'on'
        styles:
          card:
            - background: |
                linear-gradient(
                  135deg,
                  rgba(255,159,10,0.9),
                  rgba(255,200,50,0.65)
                )
          icon:
            - color: white
          name:
            - color: white
          state:
            - color: white
      - value: 'off'
        styles:
          card:
            - background: |
                rgba(var(--rgb-card-background-color),0.55)
          icon:
            - color: var(--secondary-text-color)
          name:
            - font-size: 16px
            - font-weight: 600
            - justify-self: start
            - padding-left: 5px
            - color: var(--primary-text-color)
          state:
            - color: var(--secondary-text-color)

  apple_ir:
    tap_action:
      action: toggle
    template:
      - apple_base
    styles:
      card:
        - background: |
            rgba(var(--rgb-card-background-color),0.55)
      icon:
        - color: var(--secondary-text-color)
      name:
        - color: var(--primary-text-color)